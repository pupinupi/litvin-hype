<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Игра</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ЛОББИ -->
<div id="lobby">
  <h1>🔥 Лобби</h1>

  <input id="name" placeholder="Имя">

  <h3>Выбери фишку:</h3>

  <div id="emojiSelect">
    <span onclick="selectEmoji(this)">🚗</span>
    <span onclick="selectEmoji(this)">🔥</span>
    <span onclick="selectEmoji(this)">💎</span>
    <span onclick="selectEmoji(this)">🚀</span>
  </div>

  <button onclick="startGame()">Играть</button>
</div>

<!-- ИГРА -->
<div id="game" style="display:none;">

  <h2 id="turn"></h2>

  <div id="boardWrapper">
    <img src="board.jpg" id="board">

    <div class="token" id="player">🚗</div>
  </div>

  <button onclick="rollDice()">🎲 Бросить кубик</button>

  <div id="hypeBar">
    <div id="hypeFill"></div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
