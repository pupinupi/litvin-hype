<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Игра</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ЛОББИ -->
<div id="lobby">
  <h1>🔥 Лобби</h1>

  <input id="name" placeholder="Имя">
  <input id="room" placeholder="Комната">

  <div>
    <button onclick="startGame()">Создать</button>
    <button onclick="startGame()">Войти</button>
  </div>

  <div class="emojis">
    🚗 🔥 💎 🚀
  </div>
</div>

<!-- ИГРА -->
<div id="game" style="display:none;">

  <h2 id="turn"></h2>

  <div id="boardWrapper">
    <img src="board.jpg" id="board">

    <div class="token" id="p0">🚗</div>
    <div class="token" id="p1">🔥</div>
    <div class="token" id="p2">💎</div>
    <div class="token" id="p3">🚀</div>
  </div>

  <button onclick="rollDice()">🎲 Бросить кубик</button>

  <div id="hypeBar">
    <div id="hypeFill"></div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
