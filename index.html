<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Литвин. Путь к хайпу</title>
<link rel="stylesheet" href="style.css">

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
</head>
<body>

<!-- ЛОББИ -->
<div id="lobby">
  <h1>🔥 Лобби</h1>
  <input id="name" placeholder="Имя">
  <input id="room" placeholder="Код комнаты">
  <h3>Выбери фишку:</h3>
  <div id="emojiSelect">
    <span onclick="selectEmoji(this)">🚗</span>
    <span onclick="selectEmoji(this)">🔥</span>
    <span onclick="selectEmoji(this)">💎</span>
    <span onclick="selectEmoji(this)">🚀</span>
  </div>
  <button onclick="joinRoom()">Войти в комнату</button>
</div>

<!-- ИГРА -->
<div id="game" style="display:none;">
  <h2 id="turn"></h2>
  <div id="boardWrapper">
    <img src="board.jpg" id="board">
    <div id="players"></div>
  </div>
  <button id="diceBtn" onclick="rollDice()">🎲 Бросить кубик</button>
  <h3 id="hypeText"></h3>
  <div id="hypeBar">
    <div id="hypeFill"></div>
  </div>
</div>

<!-- Модалки -->
<div id="eventModal" class="modal"></div>

<script src="script.js"></script>
</body>
</html>
