<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Литвин: Путь к хайпу</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Лобби -->
<div id="lobby">
  <h1>Лобби</h1>

  <input id="nameInput" placeholder="Имя">
  <input id="roomInput" placeholder="Код комнаты">

  <button onclick="createRoom()">Создать</button>
  <button onclick="joinRoom()">Войти</button>

  <div class="tokens">
    <div class="token">🚗</div>
    <div class="token">🔥</div>
    <div class="token">💎</div>
    <div class="token">🚀</div>
  </div>
</div>

<!-- Игра -->
<div id="game" class="hidden">
  <div id="info"></div>
  <div id="board"></div>
  <button onclick="rollDice()">🎲 Бросить кубик</button>
  <div id="players"></div>
</div>

<script type="module" src="script.js"></script>
</body>
</html>
