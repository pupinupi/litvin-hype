<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Игра</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🚗 Хайп Игра</h1>

<div id="controls">
  <input id="playerName" placeholder="Имя игрока">
  <button onclick="addPlayer()">Добавить</button>
  <button onclick="startGame()">Старт</button>
</div>

<div id="players"></div>

<button id="rollBtn" onclick="rollDice()">🎲 Бросить кубик</button>

<h2 id="turnText"></h2>

<div id="board"></div>

<div id="hypeBar">
  <div id="hypeFill"></div>
</div>

<script src="script.js"></script>
</body>
</html>
